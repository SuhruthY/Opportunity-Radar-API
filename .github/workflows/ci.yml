name: Opportunity Radar CI/CD

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  PYTHON_VERSION: '3.11'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pydantic pytest
    - name: Run tests
      run: |
        cd opportunity-radar
        python -m pytest opportunity_radar/tests/ -v

  build-and-deploy:
    if: github.event_name != 'pull_request'
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pydantic
    - name: Crawl and generate API
      run: |
        cd opportunity-radar
        python -m opportunity_radar.__main__
    - name: Prepare GitHub Pages output
      run: |
        mkdir -p _site/api
        cp opportunity-radar/index.html _site/
        cp opportunity-radar/data/api/*.json _site/api/
        echo "Pages content:"
        ls -la _site/
        ls -la _site/api/
    - name: Configure GitHub Pages
      uses: actions/configure-pages@v4
    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: _site
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
    - name: Commit generated data to main branch
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        git add opportunity-radar/data/
        git diff --staged --quiet || git commit -m "Auto-update opportunities [$(date -u +'%Y-%m-%d %H:%M:%S UTC')]"
        git push