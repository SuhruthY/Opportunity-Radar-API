name: Opportunity Radar CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "*/15 * * * *"

env:
  PYTHON_VERSION: '3.11'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pydantic pytest
    - name: Run tests
      run: |
        cd opportunity-radar
        python -m pytest opportunity_radar/tests/ -v

  crawl-and-deploy:
    if: github.event_name == 'schedule' || github.event_name == 'push'
    needs: test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pydantic
    - name: Crawl and generate API
      run: |
        cd opportunity-radar
        python -m opportunity_radar.__main__
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Commit updates
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        git add opportunity-radar/data/
        git diff --staged --quiet || git commit -m "Auto-update opportunities [$(date -u +'%Y-%m-%d %H:%M:%S UTC')]"
        git push
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: opportunity-radar/data/api
        force: true